<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rolling Simulation</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  </style>
</head>
<body>
  <div id="root"></div>
  <div id="errmsg" style="color:red;padding:10px;font-size:12px;white-space:pre-wrap;position:fixed;top:0;left:0;z-index:9999;background:rgba(0,0,0,0.85);max-width:100%;max-height:50vh;overflow:auto;display:none"></div>
  <script>
    window.onerror=function(msg,src,line,col,err){
      var d=document.getElementById('errmsg');
      d.style.display='block';
      d.textContent='ERROR: '+msg+'\nLine: '+line+'\n'+(err&&err.stack?err.stack:'');
      return false;
    };
    window.addEventListener('unhandledrejection',function(e){
      var d=document.getElementById('errmsg');
      d.style.display='block';
      d.textContent='PROMISE ERROR: '+(e.reason&&e.reason.stack?e.reason.stack:e.reason);
    });
  </script>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef } = React;

function MultiSphereSimulation() {
  const mountRef          = useRef(null);
  const rendererRef       = useRef(null);
  const cameraRef         = useRef(null);
  const sphereRef         = useRef(null);
  const hollowSphereRef   = useRef(null);
  const cylinderRef       = useRef(null);
  const hollowCylinderRef = useRef(null);
  const rankingLabelRef   = useRef(null);
  const trailRef          = useRef(null);
  const markersRef        = useRef(null);
  const htmlMarkersRef    = useRef(null); // HTML overlay 標籤容器
  const scrollRef         = useRef(null);
  const slopeMeshRef      = useRef(null);
  const sLineRef          = useRef(null);
  const mkCache = () => ({ allPts:[], allTs:[], lastT:-1, chunkStart:0, completedMeshes:[], currentMesh:null, prevTEnd:-1, wasReverse:false });
  const trailCacheRef = useRef(null);
  // 記錄四個物體上一幀距攝影機的距離，用來等比例縮放標籤
  const prevCamDistRef = useRef([20, 20, 20, 20]);
  const markerDirRef      = useRef(['up','left','right','down']);
  const markerCooldownRef = useRef([0, 0, 0, 0]); // 換方向後的冷卻幀數
  if (!trailCacheRef.current) {
    trailCacheRef.current = { solid:mkCache(), hollow:mkCache(), cylinder:mkCache(), hollowCyl:mkCache() };
  }

  const [time, setTime] = useState(0);
  const timeRef = useRef(0);

  const [liveAngle,   setLiveAngle]   = useState(30);
  const [liveHeight,  setLiveHeight]  = useState(10);
  const [liveInitSpeed, setLiveInitSpeed] = useState(10);
  const [liveHollowSph, setLiveHollowSph] = useState(0.5);
  const [liveHollowCyl, setLiveHollowCyl] = useState(0.5);

  const [committedAngle,   setCommittedAngle]   = useState(30);
  const [committedHeight,  setCommittedHeight]  = useState(10);
  const [committedInitSpd, setCommittedInitSpd] = useState(10);
  const [committedHollowSph, setCommittedHollowSph] = useState(0.5);
  const [committedHollowCyl, setCommittedHollowCyl] = useState(0.5);

  const [draftAngle,     setDraftAngle]     = useState(30);
  const [draftHeight,    setDraftHeight]    = useState(10);
  const [draftInitSpd,   setDraftInitSpd]   = useState(10);
  const [draftHollowSph, setDraftHollowSph] = useState(0.5);
  const [draftHollowCyl, setDraftHollowCyl] = useState(0.5);
  const [isAdjusting,    setIsAdjusting]    = useState(false);
  // 開啟參數面板時的快照，用來判斷關閉時是否有修改
  const paramSnapshotRef = useRef(null);
  const liveUpdateRafRef = useRef(null); // debounce live state updates via rAF

  const [playing, setPlaying] = useState(false);
  const [displaySpeed, setDisplaySpeed] = useState(1);
  const rafRef       = useRef(null);
  const lastTsRef    = useRef(null);
  const sliderMaxRef = useRef(1);
  const speedRef     = useRef(1);
  const playingRef   = useRef(false);
  const speedIdxRef  = useRef(7);
  const SPEEDS = [-8, -4, -2, -1, -0.5, -0.25, 0.25, 0.5, 1, 2, 4, 8];

  const [secPanel,   setSecPanel]   = useState(false);
  const [secParams,  setSecParams]  = useState(false);
  const [secData,    setSecData]    = useState(false);
  const [secFormula, setSecFormula] = useState(false);

  const isUphill = liveAngle < 0;
  const theta = Math.abs(liveAngle) * Math.PI / 180;

  const timeStep = 0.02;
  const gap = 1, r = 1, m = 1, g = 9.8;
  const I_solid          = 0.4 * m * r * r;
  const I_hollowSphere   = 0.4*((1-Math.pow(1-liveHollowSph,5))/(1-Math.pow(1-liveHollowSph,3)))*m*r*r;
  const I_cylinder       = 0.5 * m * r * r;
  const I_hollowCylinder = 0.5*((1-Math.pow(1-liveHollowCyl,4))/(1-Math.pow(1-liveHollowCyl,2)))*m*r*r;

  const calcY_down = (t,I) => {
    const c=(m*r*r*g)/(m*r*r+I), s=Math.sin(theta);
    return c*s*s*t*t/2;
  };

  const calcY_up = (t,I) => {
    const raw = liveInitSpeed*t*Math.sin(theta) - calcY_down(t,I);
    return Math.max(0, raw);
  };

  const calcStopTime = (I) => {
    const c=(m*r*r*g)/(m*r*r+I), s=Math.sin(theta);
    return (liveInitSpeed*s)/(c*s*s);
  };

  const calcK = (t,I) => isUphill ? calcY_up(t,I)/(Math.sin(theta)*r) : calcY_down(t,I)/(Math.sin(theta)*r);

  const calcMaxTime_down = (I) => {
    const c=(m*r*r*g)/(m*r*r+I),s=Math.sin(theta);
    let t=Math.sqrt(Math.max((2*liveHeight)/(c*s*s),0.01));
    let low=t*0.99,high=t*1.05;
    for(let i=0;i<20;i++){const mid=(low+high)/2;if(calcY_down(mid,I)<liveHeight)low=mid;else high=mid;}
    return high;
  };


  const maxTime_solid          = isUphill ? calcStopTime(I_solid)          : calcMaxTime_down(I_solid);
  const maxTime_hollowSphere   = isUphill ? calcStopTime(I_hollowSphere)   : calcMaxTime_down(I_hollowSphere);
  const maxTime_cylinder       = isUphill ? calcStopTime(I_cylinder)       : calcMaxTime_down(I_cylinder);
  const maxTime_hollowCylinder = isUphill ? calcStopTime(I_hollowCylinder) : calcMaxTime_down(I_hollowCylinder);
  const maxTime   = Math.max(maxTime_solid,maxTime_hollowSphere,maxTime_cylinder,maxTime_hollowCylinder);
  const sliderMax = Math.ceil(maxTime/timeStep)*timeStep;

  useEffect(()=>{ sliderMaxRef.current=sliderMax; },[sliderMax]);
  useEffect(()=>{ playingRef.current=playing; },[playing]);

  const getObjectPosition = (t,I,z) => {
    const cosT=Math.cos(theta), sinT=Math.sin(theta);
    if(isUphill){
      const Y=calcY_up(t,I);
      const s=Y/sinT;
      return new THREE.Vector3(s*cosT - r*sinT, s*sinT + r*cosT, z);
    } else {
      const y=Math.min(calcY_down(t,I),liveHeight);
      const s=y/sinT;
      return new THREE.Vector3(s*cosT + r*sinT, -s*sinT + r*cosT, z);
    }
  };

  const getPointPosition = (t,I,z) => {
    const cosT=Math.cos(theta), sinT=Math.sin(theta);
    const k=calcK(t,I);
    const sinK=Math.sin(k), cosK=Math.cos(k);
    if(isUphill){
      const Y=calcY_up(t,I);
      const s=Y/sinT;
      return new THREE.Vector3(
        s*cosT - r*sinT*(1-cosK) - r*cosT*sinK,
        s*sinT + r*cosT*(1-cosK) - r*sinT*sinK,
        z
      );
    } else {
      const y=Math.min(calcY_down(t,I),liveHeight);
      return new THREE.Vector3(
        y/Math.tan(theta) + r*sinT*(1-cosK) - r*cosT*sinK,
        -y + r*cosT*(1-cosK) + r*sinT*sinK,
        z
      );
    }
  };

  const [solidStopped,     setSolidStopped]     = useState(false);
  const [hollowStopped,    setHollowStopped]    = useState(false);
  const [cylinderStopped,  setCylinderStopped]  = useState(false);
  const [hollowCylStopped, setHollowCylStopped] = useState(false);
  const tol = 0.01;
  useEffect(()=>{ setSolidStopped(isUphill ? time>=maxTime_solid-tol   : calcY_down(time,I_solid)>=liveHeight-liveHeight*0.005); },[time,maxTime_solid,isUphill]);
  useEffect(()=>{ setHollowStopped(isUphill ? time>=maxTime_hollowSphere-tol : calcY_down(time,I_hollowSphere)>=liveHeight-liveHeight*0.005); },[time,maxTime_hollowSphere,isUphill]);
  useEffect(()=>{ setCylinderStopped(isUphill ? time>=maxTime_cylinder-tol : calcY_down(time,I_cylinder)>=liveHeight-liveHeight*0.005); },[time,maxTime_cylinder,isUphill]);
  useEffect(()=>{ setHollowCylStopped(isUphill ? time>=maxTime_hollowCylinder-tol : calcY_down(time,I_hollowCylinder)>=liveHeight-liveHeight*0.005); },[time,maxTime_hollowCylinder,isUphill]);

  const getRealTimeRank = (objName, stopped) => {
    if (!stopped) return null;
    const stoppedObjs = [];
    if(solidStopped) {
      const val = isUphill ? calcStopTime(I_solid) : maxTime_solid;
      stoppedObjs.push({name:'solid', val: val});
    }
    if(hollowStopped) {
      const val = isUphill ? calcStopTime(I_hollowSphere) : maxTime_hollowSphere;
      stoppedObjs.push({name:'hollow', val: val});
    }
    if(cylinderStopped) {
      const val = isUphill ? calcStopTime(I_cylinder) : maxTime_cylinder;
      stoppedObjs.push({name:'cylinder', val: val});
    }
    if(hollowCylStopped) {
      const val = isUphill ? calcStopTime(I_hollowCylinder) : maxTime_hollowCylinder;
      stoppedObjs.push({name:'hollowCyl', val: val});
    }
    if(isUphill){
      stoppedObjs.sort((a,b)=>b.val-a.val);
    } else {
      stoppedObjs.sort((a,b)=>a.val-b.val);
    }
    const idx = stoppedObjs.findIndex(o=>o.name===objName);
    return idx !== -1 ? idx + 1 : null;
  };

  const allStopped = solidStopped&&hollowStopped&&cylinderStopped&&hollowCylStopped;

  useEffect(()=>{ timeRef.current=time; },[time]);

  const handleSetSpeed = (s) => {
    const idx = SPEEDS.indexOf(s);
    speedIdxRef.current = idx;
    speedRef.current = s;
    setDisplaySpeed(s);
    const atEnd   = timeRef.current >= sliderMaxRef.current - 0.001;
    const atStart = timeRef.current <= 0.001;
    if((atEnd && s<0)||(atStart && s>0)) setPlaying(true);
  };

  useEffect(()=>{
    if(rafRef.current) cancelAnimationFrame(rafRef.current);
    lastTsRef.current=null;
    if(!playing) return;
    const loop=(ts)=>{
      if(lastTsRef.current===null){lastTsRef.current=ts;rafRef.current=requestAnimationFrame(loop);return;}
      const dt=(ts-lastTsRef.current)/1000; lastTsRef.current=ts;
      const spd=speedRef.current;
      const next=Math.max(0,Math.min(sliderMaxRef.current,timeRef.current+dt*spd));
      timeRef.current=next; setTime(next);
      if((next<=0&&spd<0)||(next>=sliderMaxRef.current&&spd>0)){setPlaying(false);return;}
      rafRef.current=requestAnimationFrame(loop);
    };
    rafRef.current=requestAnimationFrame(loop);
    return ()=>{if(rafRef.current) cancelAnimationFrame(rafRef.current);};
  },[playing]);

  const secParamsRef = useRef(false);
  useEffect(()=>{ secParamsRef.current = secParams; },[secParams]);

  useEffect(()=>{
    const onKey=(e)=>{
      if(e.target.tagName==='INPUT') return;
      if(secParamsRef.current) return; // 參數面板開啟時不觸發播放快捷鍵
      if(e.key===' '||e.code==='Space'){
        e.preventDefault();
        setPlaying(p=>{playingRef.current=!p;return !p;});
      } else if(e.key==='ArrowRight'){
        e.preventDefault();
        const cur=speedIdxRef.current;
        if(cur<SPEEDS.length-1) handleSetSpeed(SPEEDS[cur+1]);
      } else if(e.key==='ArrowLeft'){
        e.preventDefault();
        const cur=speedIdxRef.current;
        if(cur>0) handleSetSpeed(SPEEDS[cur-1]);
      }
    };
    window.addEventListener('keydown',onKey);
    return ()=>window.removeEventListener('keydown',onKey);
  },[]);

  useEffect(()=>{
    if(!mountRef.current) return;
    const W=mountRef.current.clientWidth,H=mountRef.current.clientHeight;
    const scene=new THREE.Scene(); scene.background=new THREE.Color(0x0f1419);
    const camera=new THREE.PerspectiveCamera(60,W/H,0.1,1000);
    // 初始位置先設一個合理值，第0幀的 useEffect 會立刻修正
    camera.position.set(0, 20, 8); camera.lookAt(0, 0, 0); cameraRef.current=camera;
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(W,H); renderer.setPixelRatio(window.devicePixelRatio); renderer.shadowMap.enabled=true;
    mountRef.current.appendChild(renderer.domElement); rendererRef.current=renderer;

    scene.add(new THREE.AmbientLight(0xffffff,0.6));
    const dL=new THREE.DirectionalLight(0xffffff,0.8); dL.position.set(10,10,5); dL.castShadow=true;
    dL.shadow.mapSize.width=dL.shadow.mapSize.height=2048; scene.add(dL);

    const slopeGroup = new THREE.Group();
    scene.add(slopeGroup);
    slopeMeshRef.current = null;
    sLineRef.current = null;

    const updateSlope = () => {
      if(slopeMeshRef.current) slopeGroup.remove(slopeMeshRef.current);
      if(sLineRef.current) slopeGroup.remove(sLineRef.current);

      const sinT=Math.sin(theta), cosT=Math.cos(theta);
      // 只防止完全為 0（除法保護），允許很小的角度正常計算長度
      const safeSinT = Math.max(Math.abs(sinT), 0.001);
      
      const uphillPeakH = isUphill ? Math.max(
        calcY_up(calcStopTime(I_solid),          I_solid),
        calcY_up(calcStopTime(I_hollowSphere),   I_hollowSphere),
        calcY_up(calcStopTime(I_cylinder),       I_cylinder),
        calcY_up(calcStopTime(I_hollowCylinder), I_hollowCylinder)
      ) : 0;
      
      let sWX = isUphill 
        ? (uphillPeakH/safeSinT)*1.15
        : (liveHeight/safeSinT); // 剛好延伸到使用者設定的高度
      
      if(!isFinite(sWX) || sWX <= 0) {
        sWX = 20;
      }
      
      const sWZ=2*(4*r+2*gap);
      const sGeo=new THREE.PlaneGeometry(sWX,sWZ);
      const slopeMesh=new THREE.Mesh(sGeo,new THREE.MeshPhongMaterial({color:0x3a6a8a,shininess:20,side:THREE.DoubleSide}));
      const qX=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),Math.PI/2);
      const qZ=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), isUphill ? theta : -theta);
      slopeMesh.quaternion.multiplyQuaternions(qZ,qX);
      // 斜面從原點(0,0)開始只往+X延伸，中心偏移到斜面長度一半處
      const slopeCX = (sWX/2)*cosT;
      const slopeCY = isUphill ? (sWX/2)*sinT : -(sWX/2)*sinT;
      slopeMesh.position.set(slopeCX, slopeCY, 0); slopeMesh.receiveShadow=true; 
      slopeGroup.add(slopeMesh);
      slopeMeshRef.current = slopeMesh;

      const sLine=new THREE.LineSegments(new THREE.EdgesGeometry(sGeo),new THREE.LineBasicMaterial({color:0x00ffaa}));
      sLine.quaternion.multiplyQuaternions(qZ,qX); sLine.position.copy(slopeMesh.position); 
      slopeGroup.add(sLine);
      sLineRef.current = sLine;
    };

    updateSlope();

    const mkStripes=(cA,cB,n=8)=>{
      const sz=512,cv=document.createElement('canvas'); cv.width=cv.height=sz;
      const ctx=cv.getContext('2d'),sw=sz/n;
      for(let i=0;i<n;i++){ctx.fillStyle=i%2===0?cA:cB;ctx.fillRect(i*sw,0,sw,sz);}
      return new THREE.CanvasTexture(cv);
    };
    const lerpHex=(a,b,t)=>{
      const ai=parseInt(a.replace('#',''),16),bi=parseInt(b.replace('#',''),16);
      const L=(ca,cb)=>Math.round(ca+(cb-ca)*t);
      return '#'+[L((ai>>16)&0xff,(bi>>16)&0xff),L((ai>>8)&0xff,(bi>>8)&0xff),L(ai&0xff,bi&0xff)].map(v=>v.toString(16).padStart(2,'0')).join('');
    };
    const hT=(liveHollowSph-0.01)/0.98*0.85;
    const solidSphereTex=mkStripes('#ff5533','#880011');
    const hollowSphereTex=mkStripes(lerpHex('#ffccbb','#ff5533',hT),lerpHex('#cc8877','#880011',hT));
    const solidCylTex=mkStripes('#2244dd','#001177');
    const hollowCylTex=mkStripes('#2244dd','#001177');

    const sphere=new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshPhongMaterial({map:solidSphereTex,shininess:80}));
    sphere.castShadow=true; scene.add(sphere); sphereRef.current=sphere;

    const hSphInR=(1-liveHollowSph)*r;
    const hSphG=new THREE.Group();
    hSphG.add(new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshPhongMaterial({map:hollowSphereTex,shininess:80,side:THREE.FrontSide})));
    hSphG.add(new THREE.Mesh(new THREE.SphereGeometry(r,32,32),new THREE.MeshPhongMaterial({color:0xcc3333,shininess:40,side:THREE.BackSide})));
    hSphG.add(new THREE.Mesh(new THREE.SphereGeometry(hSphInR,32,32),new THREE.MeshPhongMaterial({color:0x0a0005,shininess:0,side:THREE.BackSide})));
    hSphG.castShadow=true; scene.add(hSphG); hollowSphereRef.current=hSphG;

    const sCylG=new THREE.Group();
    sCylG.add(new THREE.Mesh(new THREE.CylinderGeometry(r,r,2*r,32,1,true),new THREE.MeshPhongMaterial({map:solidCylTex,shininess:80,side:THREE.FrontSide})));
    const capMat=new THREE.MeshPhongMaterial({color:0x1133bb,shininess:60});
    const tCap=new THREE.Mesh(new THREE.CircleGeometry(r,32),capMat); tCap.rotation.x=-Math.PI/2; tCap.position.y=r; sCylG.add(tCap);
    const bCap=new THREE.Mesh(new THREE.CircleGeometry(r,32),capMat); bCap.rotation.x=Math.PI/2; bCap.position.y=-r; sCylG.add(bCap);
    sCylG.castShadow=true; scene.add(sCylG); cylinderRef.current=sCylG;

    const hCylInR=(1-liveHollowCyl)*r;
    const hCylG=new THREE.Group();
    hCylG.add(new THREE.Mesh(new THREE.CylinderGeometry(r,r,2*r,32,1,true),new THREE.MeshPhongMaterial({map:hollowCylTex,shininess:80,side:THREE.DoubleSide})));
    hCylG.add(new THREE.Mesh(new THREE.CylinderGeometry(hCylInR,hCylInR,2*r+0.01,32,1,true),new THREE.MeshPhongMaterial({transparent:true,opacity:0,side:THREE.BackSide})));
    const rMat=new THREE.MeshPhongMaterial({color:0x5577ee,shininess:60,side:THREE.DoubleSide});
    const tR=new THREE.Mesh(new THREE.RingGeometry(hCylInR,r,32),rMat); tR.rotation.x=Math.PI/2; tR.position.y=r; hCylG.add(tR);
    const bR=new THREE.Mesh(new THREE.RingGeometry(hCylInR,r,32),rMat); bR.rotation.x=Math.PI/2; bR.position.y=-r; hCylG.add(bR);
    hCylG.castShadow=true; scene.add(hCylG); hollowCylinderRef.current=hCylG;

    const trail=new THREE.Group(); scene.add(trail); trailRef.current=trail;
    const rl=new THREE.Group(); scene.add(rl); rankingLabelRef.current=rl;
    const markers=new THREE.Group(); scene.add(markers); markersRef.current=markers;

    const axO=new THREE.Vector3(-6.0,0,1.9), axL=2.5;
    const mkLbl=(txt,col)=>{
      const cv=document.createElement('canvas'); cv.width=256; cv.height=128;
      const ctx=cv.getContext('2d'); ctx.fillStyle=col; ctx.font='bold 88px Arial';
      ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(txt,128,64);
      const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv),transparent:true}));
      sp.scale.set(2.4,1.2,1); return sp;
    };
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(1,0,0),axO,axL,0xff3333,0.4,0.25));
    const lX=mkLbl('+X','#ff8888'); lX.position.set(axO.x+axL+0.9,axO.y,axO.z); scene.add(lX);
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,1,0),axO,axL,0x33ff55,0.4,0.25));
    const lY=mkLbl('+Y','#88ffaa'); lY.position.set(axO.x,axO.y+axL+0.6,axO.z); scene.add(lY);
    scene.add(new THREE.ArrowHelper(new THREE.Vector3(0,0,1),axO,axL,0x3388ff,0.4,0.25));
    const lZ=mkLbl('+Z','#88ccff'); lZ.position.set(axO.x,axO.y,axO.z+axL+0.9); scene.add(lZ);

    const handleResize=()=>{
      if(!mountRef.current) return;
      const w=mountRef.current.clientWidth,h=mountRef.current.clientHeight;
      if(w===0||h===0) return;
      camera.aspect=w/h; camera.updateProjectionMatrix(); renderer.setSize(w,h);
    };
    window.addEventListener('resize',handleResize);
    const ro=new ResizeObserver(handleResize);
    ro.observe(mountRef.current);
    const animate=()=>{requestAnimationFrame(animate);renderer.render(scene,camera);};
    animate();
    return ()=>{
      window.removeEventListener('resize',handleResize);
      ro.disconnect();
      while(scene.children.length>0) scene.remove(scene.children[0]);
      renderer.dispose();
      if(mountRef.current&&renderer.domElement.parentNode===mountRef.current)
        mountRef.current.removeChild(renderer.domElement);
      const mkC = () => ({ allPts:[], allTs:[], lastT:-1, chunkStart:0, completedMeshes:[], currentMesh:null, prevTEnd:-1, wasReverse:false });
      trailCacheRef.current = { solid:mkC(), hollow:mkC(), cylinder:mkC(), hollowCyl:mkC() };
    };
  },[liveAngle,liveHeight,liveInitSpeed,liveHollowSph,liveHollowCyl]);

  useEffect(()=>{
    if(!sphereRef.current) return;
    
    if(isUphill && slopeMeshRef.current){
      const sinT=Math.sin(theta), cosT=Math.cos(theta);
      const peakHeights = [
        {I: I_solid, peakH: calcY_up(calcStopTime(I_solid), I_solid)},
        {I: I_hollowSphere, peakH: calcY_up(calcStopTime(I_hollowSphere), I_hollowSphere)},
        {I: I_cylinder, peakH: calcY_up(calcStopTime(I_cylinder), I_cylinder)},
        {I: I_hollowCylinder, peakH: calcY_up(calcStopTime(I_hollowCylinder), I_hollowCylinder)}
      ];
      const highestPeak = Math.max(...peakHeights.map(p => p.peakH));
      const safeSinT = Math.max(Math.abs(sinT), 0.001);
      const sWX = (highestPeak/safeSinT)*1.15;
      const sWZ=2*(4*r+2*gap);
      if(isFinite(sWX) && sWX > 0){
        const newGeo = new THREE.PlaneGeometry(sWX,sWZ);
        slopeMeshRef.current.geometry.dispose();
        slopeMeshRef.current.geometry = newGeo;
        const slopeCX = (sWX/2)*cosT;
        const slopeCY = (sWX/2)*sinT;
        slopeMeshRef.current.position.set(slopeCX, slopeCY, 0);
        if(sLineRef.current){
          sLineRef.current.geometry.dispose();
          sLineRef.current.geometry = new THREE.EdgesGeometry(newGeo);
          sLineRef.current.position.copy(slopeMeshRef.current.position);
        }
      }
    }
    
    const rl=rankingLabelRef.current;
    const z0=-(3*r+1.5*gap), z1=-(r+0.5*gap), z2=r+0.5*gap, z3=3*r+1.5*gap;

    const updObj=(mesh,I,maxT,z,isCyl=false)=>{
      const tClamped = Math.min(time, maxT);
      mesh.position.copy(getObjectPosition(tClamped,I,z));
      const k=calcK(tClamped,I);
      if(isCyl){
        const qx=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1,0,0),Math.PI/2);
        const qz=new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(0,0,1), -k);
        mesh.quaternion.multiplyQuaternions(qz,qx);
      } else {
        mesh.rotation.z = -k;
      }
    };
    updObj(sphereRef.current,        I_solid,          maxTime_solid,          z0,false);
    updObj(hollowSphereRef.current,  I_hollowSphere,   maxTime_hollowSphere,   z1,false);
    updObj(cylinderRef.current,      I_cylinder,       maxTime_cylinder,       z2,true);
    updObj(hollowCylinderRef.current,I_hollowCylinder, maxTime_hollowCylinder, z3,true);

    // rankingLabelRef 留空（排名直接整合進 marker 標籤）
    while(rl.children.length>0) rl.remove(rl.children[0]);

    {
      const trail   = trailRef.current;
      const cache   = trailCacheRef.current;
      const DT      = timeStep / 5;
      const CHUNK   = 48;
      const OVERLAP = 4;
      const TUBE_R  = 0.06;
      const TUBE_SEG= 7;

      const removeMesh = (m) => {
        if (!m) return;
        trail.remove(m);
        if (m.geometry) m.geometry.dispose();
        if (m.material) m.material.dispose();
      };

      const buildTube = (pts, color) => {
        const clean = [pts[0]];
        for (let i=1; i<pts.length; i++)
          if (pts[i].distanceTo(clean[clean.length-1]) > 1e-5) clean.push(pts[i]);
        if (clean.length < 2) return null;
        try {
          const curve = new THREE.CatmullRomCurve3(clean, false, 'chordal', 0.5);
          const tSeg  = Math.max(clean.length * 2, 16);
          const geo   = new THREE.TubeGeometry(curve, tSeg, TUBE_R, TUBE_SEG, false);
          const mat   = new THREE.MeshPhongMaterial({color, shininess:90, emissive:color, emissiveIntensity:0.2});
          return new THREE.Mesh(geo, mat);
        } catch(e) { return null; }
      };

      const updateTrail = (key, I, maxT, z, color) => {
        const tEnd = Math.min(time, maxT);
        const c = cache[key];
        const dirChanged = (c.prevTEnd > tEnd + 1e-4) !== (c.wasReverse ?? false)
          && c.prevTEnd >= 0;
        const isReverse = c.prevTEnd > tEnd + 1e-4;
        c.wasReverse = isReverse;
        c.prevTEnd = tEnd;

        // 方向切換：完整清空所有 mesh，從 allPts 截取重建，避免殘留線段
        if (dirChanged) {
          c.completedMeshes.forEach(m => removeMesh(m));
          removeMesh(c.currentMesh);
          c.completedMeshes = [];
          c.currentMesh = null;
          c.chunkStart = 0;
          // 截掉 allPts 中超過 tEnd 的部分（切回正向時）
          if (!isReverse && c.allTs.length > 0) {
            let cutIdx = c.allTs.length - 1;
            while (cutIdx > 0 && c.allTs[cutIdx] > tEnd + 1e-4) cutIdx--;
            c.allPts = c.allPts.slice(0, cutIdx + 1);
            c.allTs  = c.allTs.slice(0, cutIdx + 1);
            c.lastT  = c.allTs.length > 0 ? c.allTs[c.allTs.length-1] : -1;
          }
        }

        // 正向：累積新點
        if (!isReverse) {
          const startI = c.lastT < 0 ? 0 : Math.floor(c.lastT / DT) + 1;
          for (let i = startI; ; i++) {
            const t = i * DT;
            if (t > tEnd + 1e-9) break;
            c.allPts.push(getPointPosition(Math.min(t, tEnd), I, z));
            c.allTs.push(Math.min(t, tEnd));
            c.lastT = Math.min(t, tEnd);
            if (t >= tEnd) break;
          }
          if (c.allPts.length > 0) {
            const exactEnd = getPointPosition(tEnd, I, z);
            if (exactEnd.distanceTo(c.allPts[c.allPts.length-1]) > 1e-5) {
              c.allPts.push(exactEnd);
              c.allTs.push(tEnd);
              c.lastT = tEnd;
            }
          }
        }

        if (tEnd <= 0 || c.allPts.length < 2) {
          c.completedMeshes.forEach(m => removeMesh(m));
          removeMesh(c.currentMesh);
          c.completedMeshes = []; c.currentMesh = null;
          if (tEnd <= 0) { c.allPts = []; c.allTs = []; c.lastT = -1; c.chunkStart = 0; c.prevTEnd = -1; c.wasReverse = false; }
          return;
        }

        if (isReverse) {
          // 倒轉：二分搜尋找 tEnd 對應 index，只顯示該範圍
          let lo = 0, hi = c.allTs.length - 1, idx = 0;
          while (lo <= hi) {
            const mid = (lo + hi) >> 1;
            if (c.allTs[mid] <= tEnd + 1e-6) { idx = mid; lo = mid + 1; }
            else hi = mid - 1;
          }
          // 方向剛切換時 completedMeshes 已清空，直接重建全部
          if (dirChanged) {
            const allVisible = c.allPts.slice(0, idx + 1);
            // 分塊重建
            let cs = 0;
            while (allVisible.length - cs >= CHUNK + OVERLAP) {
              const mesh = buildTube(allVisible.slice(cs, cs + CHUNK + OVERLAP), color);
              if (mesh) { trail.add(mesh); c.completedMeshes.push(mesh); }
              cs += CHUNK;
            }
            c.chunkStart = cs;
            c.currentMesh = allVisible.slice(cs).length >= 2
              ? buildTube(allVisible.slice(cs), color) : null;
            if (c.currentMesh) trail.add(c.currentMesh);
          } else {
            // 持續倒轉：移除超出的 chunk，重建 active 段
            const keepChunks = Math.floor(idx / CHUNK);
            while (c.completedMeshes.length > keepChunks) removeMesh(c.completedMeshes.pop());
            c.chunkStart = keepChunks * CHUNK;
            removeMesh(c.currentMesh);
            const activePts = c.allPts.slice(c.chunkStart, idx + 1);
            c.currentMesh = activePts.length >= 2 ? buildTube(activePts, color) : null;
            if (c.currentMesh) trail.add(c.currentMesh);
          }
          return;
        }

        // 正向：分塊建立已完成段落
        while (c.allPts.length - c.chunkStart >= CHUNK + OVERLAP) {
          const chunkPts = c.allPts.slice(c.chunkStart, c.chunkStart + CHUNK + OVERLAP);
          const mesh = buildTube(chunkPts, color);
          if (mesh) { trail.add(mesh); c.completedMeshes.push(mesh); }
          c.chunkStart += CHUNK;
        }
        removeMesh(c.currentMesh);
        const activePts = c.allPts.slice(c.chunkStart);
        c.currentMesh = activePts.length >= 2 ? buildTube(activePts, color) : null;
        if (c.currentMesh) trail.add(c.currentMesh);
      };

      updateTrail('solid',     I_solid,          maxTime_solid,          z0, 0xff4444);
      updateTrail('hollow',    I_hollowSphere,   maxTime_hollowSphere,   z1, 0xff9999);
      updateTrail('cylinder',  I_cylinder,       maxTime_cylinder,       z2, 0x4477ff);
      updateTrail('hollowCyl', I_hollowCylinder, maxTime_hollowCylinder, z3, 0xaabbff);
    }

    if(cameraRef.current){
      const cam=cameraRef.current;
      const meshes=[sphereRef,hollowSphereRef,cylinderRef,hollowCylinderRef]
        .map(r=>r.current).filter(Boolean);
      
      if(meshes.length===4){
        const positions = meshes.map(m=>m.position);
        const centerX = positions.reduce((a,b)=>a+b.x,0)/4;

        // 攝影機跟隨：不重置位置，只做增量修正，避免每幀震盪
        {
          const allY    = meshes.map(m => m.position.y);
          const maxObjY = Math.max(...allY);
          const minObjY = Math.min(...allY);
          const midY    = (maxObjY + minObjY) / 2;
          const rangeY  = maxObjY - minObjY;

          // 目標 Y 和 lookAt Y
          const targetCamY  = midY + 18 + rangeY * 0.5;
          const targetLookY = midY - 10 - rangeY * 0.5;

          // X 跟隨場景中心（平滑插值）
          const targetCamX = centerX;
          cam.position.x += (targetCamX - cam.position.x) * 0.15;
          cam.position.y += (targetCamY  - cam.position.y) * 0.15;

          // Z 只允許增加（拉遠），不強制重置
          // 先平滑往目標 Z=8 靠近，但若 NDC 超出邊界則往外推
          cam.position.z += (8 - cam.position.z) * 0.05;

          cam.lookAt(cam.position.x, targetLookY, 0);
          cam.far = Math.max(1000, cam.position.z * 3);
          cam.updateProjectionMatrix();

          // NDC 邊界修正：X 超出 → 拉遠 Z，Y 超出 → 調整 Y，最多迭代 6 次
          const MARGIN = 0.42;
          for(let iter = 0; iter < 6; iter++) {
            const ndcs  = positions.map(p => p.clone().project(cam));
            const maxNX = Math.max(...ndcs.map(v => v.x));
            const minNX = Math.min(...ndcs.map(v => v.x));
            const maxNY = Math.max(...ndcs.map(v => v.y));
            const minNY = Math.min(...ndcs.map(v => v.y));

            const xOvershoot = Math.max(maxNX-(1-MARGIN), (-1+MARGIN)-minNX, 0);
            const yOverTop   = Math.max(maxNY - (1-MARGIN), 0);
            const yOverBot   = Math.max((-1+MARGIN) - minNY, 0);

            if(xOvershoot < 0.001 && yOverTop < 0.001 && yOverBot < 0.001) break;

            // X 超出：拉遠 Z（比例修正，不用乘數放大）
            if(xOvershoot > 0.001) {
              cam.position.z += cam.position.z * xOvershoot;
            }
            // Y 超出：移動攝影機 Y
            const fovR  = cam.fov * Math.PI / 180;
            const halfH = Math.tan(fovR / 2) * Math.abs(cam.position.z);
            if(yOverTop > 0.001) cam.position.y += yOverTop * halfH;
            if(yOverBot > 0.001) cam.position.y -= yOverBot * halfH;

            cam.lookAt(cam.position.x, targetLookY, 0);
            cam.far = Math.max(1000, cam.position.z * 3);
            cam.updateProjectionMatrix();
          }
        }

        // 標記：Three.js Sprite，scale 根據攝影機到每個物體的距離精確補償
        while(markersRef.current.children.length > 0) {
          markersRef.current.remove(markersRef.current.children[0]);
        }

        {
          const MARKER_NAMES     = ['實心球','空心球','實心柱','空心柱'];
          const MARKER_COLORS_BG = ['#aa1a00','#bb3311','#0d1eaa','#1f2fbb'];
          const MARKER_COLORS_BD = ['#ff6644','#ff9977','#5577ff','#7799ff'];

          // ── 自動標籤方向：在螢幕空間選重疊最少的方向 ──
          // 先預算各物體的 NDC 中心，以及每個方向的標籤 NDC bbox
          // 然後依序為每個物體選最佳方向

          const camDir = new THREE.Vector3();
          cam.getWorldDirection(camDir);

          const TARGET_NDC_H = 0.20;
          const DIRS = ['up','down','left','right'];

          // 計算某物體在某方向時，標籤的 NDC bbox {x0,y0,x1,y1}
          const getLabelNDC = (mesh, dir) => {
            const ndcM = mesh.position.clone().project(cam);
            const ndcT = ndcM.clone(); ndcT.y += TARGET_NDC_H;
            const wM   = ndcM.clone().unproject(cam);
            const wT   = ndcT.clone().unproject(cam);
            const dep  = mesh.position.clone().sub(cam.position).dot(camDir);
            const dM   = wM.clone().sub(cam.position).normalize();
            const dT   = wT.clone().sub(cam.position).normalize();
            const pM2  = cam.position.clone().addScaledVector(dM, dep / dM.dot(camDir));
            const pT2  = cam.position.clone().addScaledVector(dT, dep / dT.dot(camDir));
            const sH   = pM2.distanceTo(pT2);
            const sW   = sH * (340/200);
            const camRight2 = new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
            const camUp2    = new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);
            const tipW2 = sW * 0.471, tipH2 = sH * 0.45;
            let center;
            if(dir==='left')       center = mesh.position.clone().addScaledVector(camRight2,-r).addScaledVector(camRight2,-tipW2);
            else if(dir==='right') center = mesh.position.clone().addScaledVector(camRight2, r).addScaledVector(camRight2, tipW2);
            else if(dir==='up')    center = mesh.position.clone().addScaledVector(camUp2,    r).addScaledVector(camUp2,    tipH2);
            else                   center = mesh.position.clone().addScaledVector(camUp2,   -r).addScaledVector(camUp2,   -tipH2);
            const cNDC = center.clone().project(cam);
            // NDC 半高 = TARGET_NDC_H/2，NDC 半寬 = 半高 * (340/200) / aspect
            const ndcHh = TARGET_NDC_H / 2;
            const ndcHw = ndcHh * (340/200) / cam.aspect;
            return { x0:cNDC.x-ndcHw, y0:cNDC.y-ndcHh, x1:cNDC.x+ndcHw, y1:cNDC.y+ndcHh, cx:cNDC.x, cy:cNDC.y, sW, sH, camRight2, camUp2, tipW2, tipH2 };
          };

          // 計算兩個 bbox 的重疊面積
          const overlap = (a, b) => {
            const ox = Math.max(0, Math.min(a.x1,b.x1) - Math.max(a.x0,b.x0));
            const oy = Math.max(0, Math.min(a.y1,b.y1) - Math.max(a.y0,b.y0));
            return ox * oy;
          };

          // 物體自身的 NDC bbox：直接投影上/右邊緣，精確計算 NDC 半徑
          const meshNDC = meshes.map(mesh => {
            const ndc  = mesh.position.clone().project(cam);
            const camR = new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
            const camU = new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);
            const ndcR = mesh.position.clone().addScaledVector(camR, r).project(cam);
            const ndcU = mesh.position.clone().addScaledVector(camU, r).project(cam);
            const hrx  = Math.abs(ndcR.x - ndc.x);
            const hry  = Math.abs(ndcU.y - ndc.y);
            // 加一點 padding 避免剛好邊緣貼著
            return { x0:ndc.x-hrx-0.01, y0:ndc.y-hry-0.01, x1:ndc.x+hrx+0.01, y1:ndc.y+hry+0.01 };
          });

          const hasCollision = (bbox, labelBBoxes, objBBoxes) => {
            for(const lb of labelBBoxes) { if(overlap(bbox, lb) > 1e-6) return true; }
            for(const ob of objBBoxes)   { if(overlap(bbox, ob) > 1e-6) return true; }
            return false;
          };

          // 依序選方向：無碰撞就完全不動；有碰撞就找無碰撞的方向；
          // 若四個方向都有碰撞，選最小碰撞的並鎖定（不再換）
          const prevDirs   = markerDirRef.current;
          const chosenDirs = [];
          const chosenBBoxes = [];

          meshes.forEach((mesh, idx) => {
            const prevDir  = prevDirs[idx];
            const prevBBox = getLabelNDC(mesh, prevDir);
            // 排除自己的物體，只檢查其他三個
            const otherMeshNDC = meshNDC.filter((_,i) => i !== idx);

            // 無碰撞 → 完全不換
            if(!hasCollision(prevBBox, chosenBBoxes, otherMeshNDC)) {
              chosenDirs.push(prevDir);
              chosenBBoxes.push(prevBBox);
              return;
            }

            // 有碰撞 → 先找有無完全無碰撞的方向
            const freeDirs = DIRS.filter(dir => {
              const bbox = getLabelNDC(mesh, dir);
              return !hasCollision(bbox, chosenBBoxes, otherMeshNDC);
            });

            if(freeDirs.length > 0) {
              const chosen = freeDirs.includes(prevDir) ? prevDir : freeDirs[0];
              chosenDirs.push(chosen);
              chosenBBoxes.push(getLabelNDC(mesh, chosen));
            } else {
              // 四個方向都有碰撞 → 選最小重疊面積的
              let bestDir = prevDir, bestScore = Infinity;
              for(const dir of DIRS) {
                const bbox = getLabelNDC(mesh, dir);
                const score =
                  chosenBBoxes.reduce((s,cb) => s + overlap(bbox,cb), 0) +
                  otherMeshNDC.reduce((s,ob) => s + overlap(bbox,ob), 0);
                if(score < bestScore) { bestScore = score; bestDir = dir; }
              }
              chosenDirs.push(bestDir);
              chosenBBoxes.push(getLabelNDC(mesh, bestDir));
            }
          });

          markerDirRef.current = chosenDirs;
          const MARKER_DIR = chosenDirs;

          const RANKS = [
            getRealTimeRank('solid',     solidStopped),
            getRealTimeRank('hollow',    hollowStopped),
            getRealTimeRank('cylinder',  cylinderStopped),
            getRealTimeRank('hollowCyl', hollowCylStopped),
          ];

          const makeMarkerTex = (idx, rank, dir) => {
            const cv = document.createElement('canvas');
            cv.width = 340; cv.height = 200;
            const ctx = cv.getContext('2d');
            const isLeft  = dir === 'left';
            const isRight = dir === 'right';
            const isUp    = dir === 'up';
            const isDown  = dir === 'down';
            const bg  = MARKER_COLORS_BG[idx];
            const bdr = MARKER_COLORS_BD[idx];

            const bx = (isUp||isDown) ? 30 : (isLeft ? 10 : 50);
            const by = isDown ? 50 : 10;
            const bw = 280, bh = (isUp||isDown) ? 140 : 180, br2 = 28;

            // 圓角矩形
            ctx.fillStyle = bg;
            ctx.beginPath();
            ctx.moveTo(bx+br2,by); ctx.lineTo(bx+bw-br2,by); ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br2);
            ctx.lineTo(bx+bw,by+bh-br2); ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br2,by+bh);
            ctx.lineTo(bx+br2,by+bh); ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br2);
            ctx.lineTo(bx,by+br2); ctx.quadraticCurveTo(bx,by,bx+br2,by);
            ctx.closePath(); ctx.fill();

            // 三角指針
            ctx.fillStyle = bg;
            ctx.beginPath();
            if(isLeft)  { ctx.moveTo(bx+bw,by+bh/2-22); ctx.lineTo(bx+bw+40,by+bh/2); ctx.lineTo(bx+bw,by+bh/2+22); }
            if(isRight) { ctx.moveTo(bx,by+bh/2-22);    ctx.lineTo(bx-40,by+bh/2);    ctx.lineTo(bx,by+bh/2+22); }
            if(isUp)    { ctx.moveTo(bx+bw/2-22,by+bh); ctx.lineTo(bx+bw/2,190);      ctx.lineTo(bx+bw/2+22,by+bh); }
            if(isDown)  { ctx.moveTo(bx+bw/2-22,by);    ctx.lineTo(bx+bw/2,10);       ctx.lineTo(bx+bw/2+22,by); }
            ctx.closePath(); ctx.fill();

            // 邊框
            ctx.strokeStyle = bdr; ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.moveTo(bx+br2,by); ctx.lineTo(bx+bw-br2,by); ctx.quadraticCurveTo(bx+bw,by,bx+bw,by+br2);
            ctx.lineTo(bx+bw,by+bh-br2); ctx.quadraticCurveTo(bx+bw,by+bh,bx+bw-br2,by+bh);
            ctx.lineTo(bx+br2,by+bh); ctx.quadraticCurveTo(bx,by+bh,bx,by+bh-br2);
            ctx.lineTo(bx,by+br2); ctx.quadraticCurveTo(bx,by,bx+br2,by);
            ctx.closePath(); ctx.stroke();

            // 文字
            const cx = bx+bw/2;
            if(rank != null) {
              const rx = (isLeft||isUp||isDown) ? bx+44 : bx+bw-44;
              const ry = by+44;
              ctx.fillStyle='#ffdd00'; ctx.beginPath(); ctx.arc(rx,ry,38,0,Math.PI*2); ctx.fill();
              ctx.fillStyle='#000'; ctx.font='bold 44px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(rank,rx,ry);
              ctx.fillStyle='#fff'; ctx.font='bold 50px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(MARKER_NAMES[idx],cx,by+bh/2+4);
            } else {
              ctx.fillStyle='#fff'; ctx.font='bold 52px Arial'; ctx.textAlign='center'; ctx.textBaseline='middle';
              ctx.fillText(MARKER_NAMES[idx],cx,by+bh/2);
            }
            return new THREE.CanvasTexture(cv);
          };

          // 預先計算：把一個固定 NDC 高度反投影回世界單位，得到固定螢幕大小的 spriteH
          // 對每個物體用自己的 depth 做計算
          meshes.forEach((mesh, idx) => {
            const dir = MARKER_DIR[idx];

            // ── scale：NDC 反投影法，100% 保證螢幕大小固定 ──
            // 取物體的 NDC 座標，往上偏移 TARGET_NDC_H，反投影回世界座標，
            // 兩點世界距離就是對應的 spriteH
            const ndcMesh = mesh.position.clone().project(cam);
            const ndcTop  = ndcMesh.clone(); ndcTop.y += TARGET_NDC_H;
            // 反投影時保持相同的 NDC z（相同深度平面）
            const worldMesh = ndcMesh.clone().unproject(cam);
            const worldTop  = ndcTop.clone().unproject(cam);
            // unproject 出來的是射線方向，需要在物體的深度平面上取點
            // 用 view-plane depth 修正
            const depth = mesh.position.clone().sub(cam.position).dot(camDir);
            const dirM  = worldMesh.clone().sub(cam.position).normalize();
            const dirT  = worldTop.clone().sub(cam.position).normalize();
            const pM    = cam.position.clone().addScaledVector(dirM, depth / dirM.dot(camDir));
            const pT    = cam.position.clone().addScaledVector(dirT, depth / dirT.dot(camDir));
            const spriteH = pM.distanceTo(pT);
            const spriteW = spriteH * (340 / 200);

            // ── 指針尖端在 canvas 中的比例 ──
            // left/right: 尖端距 sprite 中心 X = 0.471 * spriteW
            // up/down:    尖端距 sprite 中心 Y = 0.45 * spriteH  (canvas Y=190或10，中心=100)
            const tipW = spriteW * 0.471;
            const tipH = spriteH * 0.45;

            // ── 物體半徑在當前 depth 下的世界單位（view-plane 上） ──
            // Sprite 是 billboard，XY 方向對應攝影機平面
            // 直接用 r 即可（物體半徑是世界單位）

            // ── NDC 偏移：計算 sprite 中心應在的 NDC 位置 ──
            // 做法：把「指針尖端世界座標」投影到 NDC，再加上 sprite 中心到尖端的 NDC 偏移
            // 更精確做法：直接在 view space 計算 sprite 中心位置，再轉 world
            const pMesh = mesh.position.clone().project(cam); // 物體的 NDC

            // 攝影機的 right / up 向量（view-plane 軸）
            const camRight = new THREE.Vector3(1,0,0).applyQuaternion(cam.quaternion);
            const camUp    = new THREE.Vector3(0,1,0).applyQuaternion(cam.quaternion);

            // 指針尖端的世界座標 = 物體中心 + 半徑 * 方向 + 0（尖端貼物體表面）
            // sprite 中心的世界座標 = 尖端位置 + (tipW 或 tipH) * 方向
            let spriteCenterWorld;
            if(dir === 'left') {
              const tipWorld = mesh.position.clone().addScaledVector(camRight, -r);
              spriteCenterWorld = tipWorld.clone().addScaledVector(camRight, -tipW);
            } else if(dir === 'right') {
              const tipWorld = mesh.position.clone().addScaledVector(camRight, r);
              spriteCenterWorld = tipWorld.clone().addScaledVector(camRight, tipW);
            } else if(dir === 'up') {
              // up = 螢幕上方 = camUp 正方向，但世界Z軸在view space的up分量需考慮
              // 攝影機是看 -Z 方向，世界-Z在螢幕上投影為「上方」
              // 用 camUp 方向做偏移
              const tipWorld = mesh.position.clone().addScaledVector(camUp, r);
              spriteCenterWorld = tipWorld.clone().addScaledVector(camUp, tipH);
            } else { // down
              const tipWorld = mesh.position.clone().addScaledVector(camUp, -r);
              spriteCenterWorld = tipWorld.clone().addScaledVector(camUp, -tipH);
            }

            const sp = new THREE.Sprite(new THREE.SpriteMaterial({
              map: makeMarkerTex(idx, RANKS[idx], dir),
              transparent: true, depthTest: false
            }));
            sp.scale.set(spriteW, spriteH, 1);
            sp.position.copy(spriteCenterWorld);
            sp.renderOrder = 998;
            markersRef.current.add(sp);
          });
        }


      }
    }

            paramSnapshotRef.current = null;
          } setSecParams(false);setSecData(false);setSecFormula(false);}else{if(scrollRef.current)scrollRef.current.scrollTop=0;}return !p; }))}
            style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'9px 14px',borderRadius:'9px',cursor:'pointer',background:secPanel?'linear-gradient(90deg,rgba(0,255,136,0.10) 0%,rgba(100,150,255,0.08) 100%)':'rgba(255,255,255,0.04)',border:`1px solid ${secPanel?'rgba(0,255,136,0.35)':'rgba(255,255,255,0.1)'}`,transition:'all 0.25s ease',userSelect:'none',WebkitTapHighlightColor:'transparent',touchAction:'manipulation'}}>
            <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:'3px',textAlign:'center'}}>
              <span style={{fontSize:'12px',fontWeight:'bold',letterSpacing:'1.2px',textTransform:'uppercase',color:secPanel?'#e0e0e0':'#777',transition:'color 0.25s ease'}}>詳細面板</span>
              <span style={{fontSize:'10px',color:secPanel?'rgba(0,255,136,0.7)':'#444',transition:'color 0.25s ease'}}>參數 · 數據 · 公式</span>
            </div>
            <span style={{fontSize:'16px',color:secPanel?'#00ff88':'#555',transform:secPanel?'rotate(0deg)':'rotate(-90deg)',transition:'transform 0.28s ease, color 0.25s ease',lineHeight:1,flexShrink:0}}>▾</span>
          </div>
        </div>

        <div style={{overflow:'hidden',maxHeight:secPanel?'calc(50vh - 80px)':'0',transition:'max-height 0.35s cubic-bezier(0.4,0,0.2,1)'}}>
          <div ref={scrollRef} style={{maxHeight:'calc(50vh - 130px)',overflowY:'auto',overflowX:'hidden',WebkitOverflowScrolling:'touch',padding:'4px 16px 20px'}}>

            <div style={{marginBottom:'10px'}}>
              <SectionHeader title="參數控制" open={secParams} onToggle={()=>{
                if(secParams){
                  // 關閉面板：比對快照，只有修改過才重置
                  const snap = paramSnapshotRef.current;
                  const changed = !snap ||
                    snap.angle !== draftAngle ||
                    snap.height !== draftHeight ||
                    snap.initSpd !== draftInitSpd ||
                    snap.hollowSph !== draftHollowSph ||
                    snap.hollowCyl !== draftHollowCyl;

                  const ang = draftAngle === 0 ? (draftAngle > 0 ? 1 : -1) : draftAngle;
                  setLiveAngle(ang);
                  setLiveHeight(draftHeight);
                  setLiveInitSpeed(draftInitSpd);
                  setLiveHollowSph(draftHollowSph);
                  setLiveHollowCyl(draftHollowCyl);

                  if(changed){
                    setCommittedAngle(ang);
                    setCommittedHeight(draftHeight);
                    setCommittedInitSpd(draftInitSpd);
                    setCommittedHollowSph(draftHollowSph);
                    setCommittedHollowCyl(draftHollowCyl);
                    setPlaying(false);
                    setTime(0);
                    setDisplaySpeed(1);
                    speedRef.current=1;
                    speedIdxRef.current=8;
                    if(rankingLabelRef.current){
                      while(rankingLabelRef.current.children.length>0)
                        rankingLabelRef.current.remove(rankingLabelRef.current.children[0]);
                    }
                    if(trailRef.current){
                      while(trailRef.current.children.length>0){
                        const child = trailRef.current.children[0];
                        if(child.geometry) child.geometry.dispose();
                        if(child.material) child.material.dispose();
                        trailRef.current.remove(child);
                      }
                    }
                    const mkC = () => ({ allPts:[], allTs:[], lastT:-1, chunkStart:0, completedMeshes:[], currentMesh:null, prevTEnd:-1, wasReverse:false });
                    trailCacheRef.current = { solid:mkC(), hollow:mkC(), cylinder:mkC(), hollowCyl:mkC() };
                  }
                  setIsAdjusting(false);
                  paramSnapshotRef.current = null;
                } else {
                  // 開啟面板：記錄快照
                  paramSnapshotRef.current = {
                    angle: liveAngle, height: liveHeight, initSpd: liveInitSpeed,
                    hollowSph: liveHollowSph, hollowCyl: liveHollowCyl
                  };
                  commitRef.current = {
                    angle: liveAngle, height: liveHeight, initSpd: liveInitSpeed,
                    hollowSph: liveHollowSph, hollowCyl: liveHollowCyl
                  };
                  setDraftAngle(liveAngle);
                  setDraftHeight(liveHeight);
                  setDraftInitSpd(liveInitSpeed);
                  setDraftHollowSph(liveHollowSph);
                  setDraftHollowCyl(liveHollowCyl);
                  setIsAdjusting(true);
                  setPlaying(false);
                }
                setSecParams(p=>!p);
              }} accent="#00ff88"
                count={draftIsUphill?"θ 斜面角度 · 初速 V\n空心球壁厚 · 空心柱壁厚":"θ 斜面角度 · 斜面高度 H\n空心球壁厚 · 空心柱壁厚"} />
              <div className={`collapsible-body ${secParams?'open':'closed'}`} style={{maxHeight:secParams?'400px':'0'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'14px',paddingBottom:'4px'}}>
                  {paramRows.map(({label,cls,min,max,step,val,set,onRelease,unit,color,toFixed,toggleDir})=>(
                    <div key={label}>
                      <div className="cl" style={{display:'flex',alignItems:'center',gap:'6px'}}>
                        <span>{label}</span>
                        {toggleDir && (
                          <button onPointerDown={pd(toggleDir)}
                            style={{fontSize:'11px',padding:'3px 10px',borderRadius:'6px',border:'1px solid rgba(255,150,100,0.7)',background:'rgba(255,100,60,0.25)',color:'#ffaa77',cursor:'pointer',lineHeight:'1.6',flexShrink:0,fontWeight:'bold',letterSpacing:'0.5px',boxShadow:'0 0 6px rgba(255,100,60,0.2)'}}>
                            {draftIsUphill ? '↓ 改下坡' : '↑ 改爬坡'}
                          </button>
                        )}
                      </div>
                      <div className="cr">
                        <input type="range" min={min} max={max} step={step} value={val} className={cls}
                          onChange={e=>set(parseFloat(e.target.value))}
                          onMouseUp={()=>onRelease&&onRelease()}
                          onKeyDown={e=>{ if(e.key==='ArrowLeft'||e.key==='ArrowRight') e.stopPropagation(); }}
                          onKeyUp={e=>{ if(e.key==='ArrowLeft'||e.key==='ArrowRight') { onRelease&&onRelease(); } }}
                          onTouchEnd={e=>{ e.target.blur(); onRelease&&onRelease(); }}
                          style={{flex:1}} />
                        <input type="number" min={min} max={max} step={step} value={val}
                          onChange={e=>set(parseFloat(e.target.value)||min)}
                          onBlur={()=>onRelease&&onRelease()}
                          style={{width:'52px'}} />
                      </div>
                      <div className="cv" style={{color}}>{typeof val==='number'?val.toFixed(toFixed):val}{unit}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div style={{height:'1px',background:'rgba(0,255,136,0.08)',marginBottom:'10px'}}/>

            <div style={{marginBottom:'10px'}}>
              <SectionHeader title="物體數據" open={secData} onToggle={()=>setSecData(p=>!p)} accent="#88aaff"
                count={`實心球 · 空心球 · 實心圓柱 · 空心圓柱\nt = ${time.toFixed(2)}s`} />
              <div className={`collapsible-body ${secData?'open':'closed'}`} style={{maxHeight:secData?'700px':'0'}}>
                <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:'10px',paddingBottom:'4px'}}>
                  {[
                    {label:'實心球',   sub:'',                                        color:'#ff6464',bg:'rgba(255,68,68,0.1)',   border:'rgba(255,68,68,0.3)',  I:I_solid,         y:y_solid,      k:k_solid,      stopped:solidStopped,    maxT:maxTime_solid,         peakY:getPeakY(I_solid),         rankKey:'solid'},
                    {label:'空心球',   sub:` x=${liveHollowSph.toFixed(2)}`,    color:'#ff8888',bg:'rgba(255,100,68,0.08)',border:'rgba(255,100,100,0.3)',I:I_hollowSphere,  y:y_hollow,     k:k_hollow,     stopped:hollowStopped,   maxT:maxTime_hollowSphere,  peakY:getPeakY(I_hollowSphere),  rankKey:'hollow'},
                    {label:'實心圓柱', sub:'',                                        color:'#6464ff',bg:'rgba(68,68,255,0.1)',   border:'rgba(68,68,255,0.3)',  I:I_cylinder,      y:y_cylinder,   k:k_cylinder,   stopped:cylinderStopped, maxT:maxTime_cylinder,      peakY:getPeakY(I_cylinder),      rankKey:'cylinder'},
                    {label:'空心圓柱', sub:` x=${liveHollowCyl.toFixed(2)}`, color:'#8888ff',bg:'rgba(68,68,255,0.08)', border:'rgba(100,100,255,0.3)',I:I_hollowCylinder,y:y_hollow_cyl, k:k_hollow_cyl, stopped:hollowCylStopped,maxT:maxTime_hollowCylinder,peakY:getPeakY(I_hollowCylinder),rankKey:'hollowCyl'},
                  ].map(({label,sub,color,bg,border,I,y,k,stopped,maxT,peakY,rankKey})=>(
                    <div key={label} className="card" style={{background:bg,border:`1px solid ${border}`}}>
                      <div style={{color,fontWeight:'bold',marginBottom:'4px'}}>{label}{sub}</div>
                      <div style={{color:'#ccc'}}>轉動慣量 = {I.toFixed(3)}</div>
                      <div style={{color:'#ccc'}}>{distLabel} = {y.toFixed(3)} m</div>
                      <div style={{color:'#ccc'}}>旋轉角度 = {(k*180/Math.PI).toFixed(1)}°</div>
                      {isUphill && stopped && (
                        <div style={{color:'#aaffcc',marginTop:'4px',fontSize:'11px'}}>最高點 = {peakY.toFixed(3)} m</div>
                      )}
                      {stopped && (
                        <div style={{color:'#ffff44',marginTop:'2px',fontSize:'11px'}}>
                          {isUphill 
                            ? `✓ 停止時間 ${calcStopTime(I).toFixed(2)}s — 第${getRealTimeRank(rankKey, true)}名` 
                            : `✓ ${maxT.toFixed(2)}s — 第${getRealTimeRank(rankKey, true)}名`}
                        </div>
                      )}
                      {stopped && !allStopped && (
                        <div style={{color:'#888',marginTop:'4px',fontSize:'11px'}}>⏳ 等待其他...</div>
                      )}
                    </div>
                  ))}
                </div>
              </div>
            </div>

            <div style={{height:'1px',background:'rgba(0,255,136,0.08)',marginBottom:'10px'}}/>

            <div style={{marginBottom:'4px'}}>
              <SectionHeader title="基本公式" open={secFormula} onToggle={()=>setSecFormula(p=>!p)}
                count={isUphill?"▲爬坡 | 轉動慣量 · y(t) · Y(t) · k(t)\ns(t) · 球心位置 · 擺線軌跡":"▼下坡 | 轉動慣量 · y(t) · k(t)\ns(t) · 球心位置 · 擺線軌跡"} accent="#ffcc44" />
              <div className={`collapsible-body ${secFormula?'open':'closed'}`} style={{maxHeight:secFormula?'1100px':'0'}}>
                <div style={{background:'rgba(0,255,136,0.04)',border:'1px solid rgba(0,255,136,0.12)',borderRadius:'10px',padding:'14px',fontSize:'11px',fontFamily:"'Courier New',monospace",lineHeight:'2.0',color:'#ccc'}}>

                  <div style={{marginBottom:'10px',padding:'5px 10px',borderRadius:'6px',background:isUphill?'rgba(255,160,80,0.12)':'rgba(0,255,136,0.08)',border:`1px solid ${isUphill?'rgba(255,160,80,0.35)':'rgba(0,255,136,0.25)'}`,color:isUphill?'#ffaa44':'#00ff88',fontWeight:'bold',letterSpacing:'1px',textAlign:'center'}}>
                    {isUphill ? '▲ 爬坡模式' : '▼ 下坡模式'}
                  </div>

                  <div style={{color:'#ffff88',marginBottom:'8px'}}>r={r} m | m={m} kg | g={g} m/s² | θ={Math.abs(liveAngle)}°{isUphill?` | V=${liveInitSpeed} m/s`:` | H=${liveHeight} m`}</div>

                  <div style={{marginBottom:'10px'}}>
                    <span className="fk">轉動慣量：</span><br/>
                    I(實心球) = 2/5·mr² = <span className="fv">{I_solid.toFixed(4)}</span><br/>
                    I(空心球) = 2/5·mr²·(1−(1−x)⁵)/(1−(1−x)³) = <span className="fv">{I_hollowSphere.toFixed(4)}</span><br/>
                    I(實心柱) = 1/2·mr² = <span className="fv">{I_cylinder.toFixed(4)}</span><br/>
                    I(空心柱) = 1/2·mr²·(1−(1−x)⁴)/(1−(1−x)²) = <span className="fv">{I_hollowCylinder.toFixed(4)}</span>
                  </div>

                  <div style={{marginBottom:'10px'}}>
                    <span className="fk">滾動距離垂直分量 y(t)【{isUphill?'爬坡':'下坡'}】：</span><br/>
                    y(t) = [mr²g / (mr²+I)] · sin²θ · t² / 2
                  </div>

                  {isUphill ? (
                    <div style={{marginBottom:'10px'}}>
                      <span className="fk">上升垂直距離 Y(t)【爬坡】：</span><br/>
                      Y(t) = V·t·sinθ − y(t)<br/>
                      停止時間 t_stop = V·(mr²+I) / (mr²·g·sinθ)
                    </div>
                  ) : (
                    <div style={{marginBottom:'10px'}}>
                      <span className="fk">下降垂直距離【下坡】：</span><br/>
                      y(t) 即為下降垂直距離，上限為 H = {liveHeight} m
                    </div>
                  )}

                  <div style={{marginBottom:'10px'}}>
                    <span className="fk">旋轉角弧度 k(t)：</span><br/>
                    {isUphill ? <>k(t) = Y(t) / (r · sinθ)</> : <>k(t) = y(t) / (r · sinθ)</>}
                  </div>

                  <div style={{marginBottom:'10px'}}>
                    <span className="fk">沿斜面距離 s(t)【{isUphill?'爬坡':'下坡'}】：</span><br/>
                    {isUphill ? <>s(t) = Y(t) / sinθ</> : <>s(t) = y(t) / sinθ</>}
                  </div>

                  <div style={{marginBottom:'10px'}}>
                    <span className="fk">球/柱心位置【{isUphill?'爬坡':'下坡'}】：</span><br/>
                    {isUphill ? (
                      <>
                        x_c = s·cosθ − r·sinθ<br/>
                        y_c = s·sinθ + r·cosθ<br/>
                        z_c = zOffset<br/>
                        <span style={{color:'#888',fontSize:'10px'}}>法線方向 = (−sinθ, cosθ)</span>
                      </>
                    ) : (
                      <>
                        x_c = s·cosθ + r·sinθ<br/>
                        y_c = −s·sinθ + r·cosθ<br/>
                        z_c = zOffset<br/>
                        <span style={{color:'#888',fontSize:'10px'}}>法線方向 = (sinθ, cosθ)</span>
                      </>
                    )}
                  </div>

                  <div style={{borderTop:'1px solid rgba(0,255,136,0.15)',paddingTop:'10px'}}>
                    <span className="fk">軌跡點座標（擺線 cycloid）</span><br/>
                    {isUphill ? (
                      <>
                        <span style={{color:'#aaffcc'}}>推導（從下坡反推）：斜面法向量 x 取反 → 接觸向量 x 取反</span><br/>
                        初始接觸向量（球心→接觸點）= (+sinθ, −cosθ)<br/>
                        旋轉方向：順時針（向右上滾 = ω &lt; 0）<br/><br/>
                        x_p = s·cosθ − r·sinθ·(1−cos k) − r·cosθ·sin k<br/>
                        y_p = s·sinθ + r·cosθ·(1−cos k) − r·sinθ·sin k<br/>
                        z_p = zOffset<br/>
                        <span style={{color:'#888',fontSize:'10px'}}>s = Y(t)/sinθ，k=2nπ 時接觸點精確落回斜面</span>
                      </>
                    ) : (
                      <>
                        <span style={{color:'#aaffcc'}}>推導：接觸點 = 球心 + r × 順時針旋轉(初始接觸向量, k)</span><br/>
                        初始接觸向量（球心→接觸點）= (−sinθ, −cosθ)<br/>
                        旋轉方向：順時針（向右下滾 = ω &lt; 0）<br/><br/>
                        x_p = x_c + r·sinθ·(1−cos k) − r·cosT·sin k<br/>
                        y_p = y_c + r·cosθ·(1−cos k) + r·sinθ·sin k<br/>
                        z_p = zOffset<br/>
                        <span style={{color:'#888',fontSize:'10px'}}>x_c = y/tanθ + r·sinθ，y_c = −y + r·cosθ</span>
                      </>
                    )}
                    <br/><span style={{color:'#888',fontSize:'10px'}}>|接觸點 − 球心| = r 恆成立；k=2nπ 時接觸點落回斜面</span>
                  </div>

                </div>
              </div>
            </div>

          </div>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<MultiSphereSimulation />);
  </script>
</body>
</html>
